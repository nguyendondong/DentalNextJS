name: Deploy Landing to Cloudflare Workers

on:
  push:
    branches: [develop, stg, main]
  workflow_dispatch:

concurrency:
  group: deploy-landing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-landing:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'PROD' || github.ref_name == 'stg' && 'STG' || 'DEV' }}
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve deploy environment
        run: |
          case "${GITHUB_REF_NAME}" in
            develop)
              echo "DEPLOY_ENV=dev" >> "$GITHUB_ENV"
              echo "NEXTJS_ENVIRONMENT=development" >> "$GITHUB_ENV"
              ;;
            stg)
              echo "DEPLOY_ENV=stg" >> "$GITHUB_ENV"
              echo "NEXTJS_ENVIRONMENT=staging" >> "$GITHUB_ENV"
              ;;
            main)
              echo "DEPLOY_ENV=prod" >> "$GITHUB_ENV"
              echo "NEXTJS_ENVIRONMENT=production" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build & Deploy to Cloudflare Workers
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXTJS_ENV: ${{ env.NEXTJS_ENVIRONMENT }}
        run: bunx opennextjs-cloudflare build && bunx opennextjs-cloudflare deploy --env ${{ env.DEPLOY_ENV }}
        working-directory: .

      - name: Summary
        run: |
          echo "### Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ env.DEPLOY_ENV }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${GITHUB_REF_NAME} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${GITHUB_SHA:0:7} |" >> "$GITHUB_STEP_SUMMARY"
